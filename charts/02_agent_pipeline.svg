<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect width="1000" height="660" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="58" fill="#312e81"/>
  <text x="500" y="36" text-anchor="middle" fill="white" font-size="21" font-weight="bold">Agent AI 처리 파이프라인 — 상세 흐름</text>

  <!-- STEP 1 -->
  <rect x="380" y="75" width="240" height="60" rx="10" fill="#4f46e5" stroke="#312e81" stroke-width="2"/>
  <text x="500" y="100" text-anchor="middle" fill="white" font-size="13" font-weight="bold">STEP 1</text>
  <text x="500" y="120" text-anchor="middle" fill="#c7d2fe" font-size="11">HMI 이미지 수신 (장비별 개별 요청)</text>

  <line x1="500" y1="135" x2="500" y2="158" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Parallel processing -->
  <text x="500" y="172" text-anchor="middle" fill="#9333ea" font-size="10" font-style="italic">⚡ 병렬 실행 (동시)</text>
  <line x1="220" y1="178" x2="780" y2="178" stroke="#7c3aed" stroke-width="2"/>
  <line x1="220" y1="178" x2="220" y2="198" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="780" y1="178" x2="780" y2="198" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- DI Agent -->
  <rect x="60" y="198" width="320" height="160" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="60" y="198" width="320" height="36" rx="12" fill="#2563eb"/>
  <rect x="60" y="218" width="320" height="16" fill="#2563eb"/>
  <text x="220" y="221" text-anchor="middle" fill="white" font-size="13" font-weight="bold">STEP 2 — DI Agent (숫자 추출)</text>
  <text x="220" y="250" text-anchor="middle" fill="#1e40af" font-size="11">Azure Document Intelligence</text>
  <text x="220" y="268" text-anchor="middle" fill="#1e40af" font-size="10">prebuilt-layout 모델 (테이블 OCR)</text>
  <line x1="100" y1="282" x2="360" y2="282" stroke="#bfdbfe" stroke-width="1"/>
  <text x="130" y="300" fill="#374151" font-size="10">• S520: 28개 수치값</text>
  <text x="130" y="316" fill="#374151" font-size="10">• S530: 28개 수치값</text>
  <text x="130" y="332" fill="#374151" font-size="10">• S810: 30개 수치값</text>

  <!-- LLM Agent -->
  <rect x="620" y="198" width="320" height="160" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <rect x="620" y="198" width="320" height="36" rx="12" fill="#16a34a"/>
  <rect x="620" y="218" width="320" height="16" fill="#16a34a"/>
  <text x="780" y="221" text-anchor="middle" fill="white" font-size="13" font-weight="bold">STEP 2 — LLM Agent (색상 감지)</text>
  <text x="780" y="250" text-anchor="middle" fill="#14532d" font-size="11">Azure OpenAI GPT-4o Vision</text>
  <text x="780" y="268" text-anchor="middle" fill="#14532d" font-size="10">langchain-openai / Vision 분석</text>
  <line x1="640" y1="282" x2="920" y2="282" stroke="#bbf7d0" stroke-width="1"/>
  <text x="660" y="300" fill="#374151" font-size="10">• S520/S530/S810: 빨간 영역 감지</text>
  <text x="660" y="316" fill="#374151" font-size="10">• S540: 12개 스테이션 색상 판별</text>
  <text x="660" y="332" fill="#374151" font-size="10">• 화면 모드 감지 (Setup/Machine Param)</text>

  <!-- DI Validation -->
  <line x1="220" y1="358" x2="220" y2="385" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="385" width="280" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="220" y="407" text-anchor="middle" fill="#92400e" font-size="12" font-weight="bold">STEP 3 — DI 검증</text>
  <text x="220" y="425" text-anchor="middle" fill="#78350f" font-size="10">장비 ID 누락 시 → 즉시 UNKNOWN 반환</text>

  <!-- Merge arrows -->
  <line x1="220" y1="440" x2="220" y2="470" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="780" y1="358" x2="780" y2="470" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="220" y1="470" x2="780" y2="470" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="500" y1="470" x2="500" y2="490" stroke="#6b7280" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- Merge box -->
  <rect x="310" y="490" width="380" height="55" rx="10" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="500" y="512" text-anchor="middle" fill="#713f12" font-size="13" font-weight="bold">STEP 4 — 최종 판정 병합</text>
  <text x="500" y="532" text-anchor="middle" fill="#854d0e" font-size="10">숫자 NG (≥3000) + 색상 NG (RED) → 최종 결정</text>

  <!-- Result branches -->
  <line x1="500" y1="545" x2="500" y2="565" stroke="#eab308" stroke-width="2"/>
  <line x1="200" y1="565" x2="800" y2="565" stroke="#eab308" stroke-width="2"/>
  <line x1="200" y1="565" x2="200" y2="585" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="500" y1="565" x2="500" y2="585" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="800" y1="565" x2="800" y2="585" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>

  <!-- OK -->
  <rect x="100" y="585" width="200" height="55" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="608" text-anchor="middle" fill="#14532d" font-size="14" font-weight="bold">✅ OK</text>
  <text x="200" y="628" text-anchor="middle" fill="#166534" font-size="10">로그 기록 · 초록 표시</text>

  <!-- NG -->
  <rect x="400" y="585" width="200" height="55" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="500" y="608" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="bold">❌ NG</text>
  <text x="500" y="628" text-anchor="middle" fill="#b91c1c" font-size="10">로그 기록 · 빨간 표시 · NG 상세</text>

  <!-- UNKNOWN -->
  <rect x="700" y="585" width="200" height="55" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="800" y="608" text-anchor="middle" fill="#92400e" font-size="14" font-weight="bold">⚠️ UNKNOWN</text>
  <text x="800" y="628" text-anchor="middle" fill="#78350f" font-size="10">로그 · 📧 이메일 알림 발송</text>
</svg>
