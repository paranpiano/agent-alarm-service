<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 860" width="900" height="860" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#475569"/>
    </marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#16a34a"/>
    </marker>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/>
    </marker>
    <marker id="arrO" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#d97706"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="860" fill="#f1f5f9" rx="14"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="52" rx="14" fill="#1e293b"/>
  <rect x="0" y="38" width="900" height="14" fill="#1e293b"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="white">무업데이트 감지 이메일 알림 워크플로우 (정식 버전)</text>

  <!-- ── LANE LABELS ── -->
  <!-- Lane: Client PC -->
  <rect x="10" y="62" width="130" height="786" rx="8" fill="#dbeafe" opacity="0.5"/>
  <text x="75" y="160" text-anchor="middle" font-size="13" font-weight="bold" fill="#1d4ed8" transform="rotate(-90,75,160)">Client PC</text>

  <!-- Lane: AWS -->
  <rect x="620" y="62" width="270" height="786" rx="8" fill="#fce7f3" opacity="0.5"/>
  <text x="755" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#9d174d" transform="rotate(-90,755,200)">AWS Cloud</text>

  <!-- ══════════════════════════════════════════
       STEP 1 — 시작
  ══════════════════════════════════════════ -->
  <rect x="150" y="76" width="460" height="44" rx="10" fill="#1e293b" filter="url(#shadow)"/>
  <text x="380" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="white">background_monitor.py 시작</text>
  <text x="380" y="112" text-anchor="middle" font-size="11" fill="#94a3b8">BackgroundMonitor.__init__() → root.after(500, _poll)</text>

  <!-- Arrow down -->
  <line x1="380" y1="120" x2="380" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════
       STEP 2 — monitor_config.json 로드
  ══════════════════════════════════════════ -->
  <rect x="150" y="148" width="460" height="44" rx="10" fill="#0f172a" filter="url(#shadow)"/>
  <text x="380" y="168" text-anchor="middle" font-size="13" font-weight="bold" fill="white">monitor_config.json 로드</text>
  <text x="380" y="184" text-anchor="middle" font-size="11" fill="#94a3b8">interval_sec / no_update_alert_enabled / sns_* 설정 읽기</text>

  <!-- Arrow down -->
  <line x1="380" y1="192" x2="380" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════
       STEP 3 — 폴링 (30초 주기)
  ══════════════════════════════════════════ -->
  <rect x="150" y="220" width="460" height="44" rx="10" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="380" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="white">_poll() 실행 (매 interval_sec 마다)</text>
  <text x="380" y="256" text-anchor="middle" font-size="11" fill="#bfdbfe">Thread → LogApiClient.get_logs() 호출</text>

  <!-- Arrow to AWS -->
  <line x1="610" y1="242" x2="648" y2="242" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AWS: API Gateway -->
  <rect x="648" y="220" width="220" height="44" rx="10" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="758" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="white">API Gateway</text>
  <text x="758" y="256" text-anchor="middle" font-size="11" fill="#ede9fe">GET /logs?date=today</text>

  <!-- Arrow AWS → DynamoDB -->
  <line x1="758" y1="264" x2="758" y2="292" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AWS: DynamoDB -->
  <rect x="648" y="292" width="220" height="44" rx="10" fill="#5b21b6" filter="url(#shadow)"/>
  <text x="758" y="312" text-anchor="middle" font-size="13" font-weight="bold" fill="white">DynamoDB</text>
  <text x="758" y="328" text-anchor="middle" font-size="11" fill="#ddd6fe">로그 레코드 반환</text>

  <!-- Arrow DynamoDB → back -->
  <line x1="648" y1="314" x2="610" y2="314" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <!-- vertical connector -->
  <line x1="610" y1="242" x2="610" y2="314" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow down from poll -->
  <line x1="380" y1="264" x2="380" y2="310" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════
       STEP 4 — 새 데이터 있음?
  ══════════════════════════════════════════ -->
  <polygon points="380,310 490,338 380,366 270,338" fill="#d97706" filter="url(#shadow)"/>
  <text x="380" y="334" text-anchor="middle" font-size="12" font-weight="bold" fill="white">새 데이터 있음?</text>
  <text x="380" y="350" text-anchor="middle" font-size="10" fill="#fef3c7">(timestamp 비교)</text>

  <!-- YES → right -->
  <line x1="490" y1="338" x2="560" y2="338" stroke="#16a34a" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="525" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#16a34a">YES</text>
  <rect x="560" y="318" width="140" height="40" rx="8" fill="#dcfce7"/>
  <text x="630" y="336" text-anchor="middle" font-size="11" fill="#166534">_last_update_time = now()</text>
  <text x="630" y="350" text-anchor="middle" font-size="11" fill="#166534">_no_update_alert_sent = False</text>

  <!-- NO → down -->
  <line x1="380" y1="366" x2="380" y2="400" stroke="#dc2626" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="392" y="387" font-size="11" font-weight="bold" fill="#dc2626">NO</text>

  <!-- Loop back arrow (YES → next poll) -->
  <path d="M700,338 Q740,338 740,420 Q740,500 700,500" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <text x="748" y="430" font-size="10" fill="#16a34a">다음 폴링</text>
  <text x="748" y="442" font-size="10" fill="#16a34a">대기</text>

  <!-- ══════════════════════════════════════════
       STEP 5 — no_update_alert_enabled?
  ══════════════════════════════════════════ -->
  <polygon points="380,400 490,428 380,456 270,428" fill="#d97706" filter="url(#shadow)"/>
  <text x="380" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="white">no_update_alert</text>
  <text x="380" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="white">_enabled = true?</text>

  <!-- NO → left skip -->
  <line x1="270" y1="428" x2="200" y2="428" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="235" y="420" text-anchor="middle" font-size="11" fill="#64748b">NO</text>
  <rect x="30" y="414" width="170" height="28" rx="8" fill="#f1f5f9"/>
  <text x="115" y="432" text-anchor="middle" font-size="11" fill="#64748b">알림 스킵 → 다음 폴링</text>

  <!-- YES → down -->
  <line x1="380" y1="456" x2="380" y2="490" stroke="#dc2626" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="392" y="477" font-size="11" font-weight="bold" fill="#dc2626">YES</text>

  <!-- ══════════════════════════════════════════
       STEP 6 — 경과 시간 ≥ threshold?
  ══════════════════════════════════════════ -->
  <polygon points="380,490 490,518 380,546 270,518" fill="#d97706" filter="url(#shadow)"/>
  <text x="380" y="512" text-anchor="middle" font-size="12" font-weight="bold" fill="white">경과 시간 ≥</text>
  <text x="380" y="528" text-anchor="middle" font-size="12" font-weight="bold" fill="white">no_update_alert_minutes?</text>

  <!-- NO → left skip -->
  <line x1="270" y1="518" x2="200" y2="518" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="235" y="510" text-anchor="middle" font-size="11" fill="#64748b">NO</text>
  <rect x="30" y="504" width="170" height="28" rx="8" fill="#f1f5f9"/>
  <text x="115" y="522" text-anchor="middle" font-size="11" fill="#64748b">스킵 → 다음 폴링</text>

  <!-- YES → down -->
  <line x1="380" y1="546" x2="380" y2="580" stroke="#dc2626" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="392" y="567" font-size="11" font-weight="bold" fill="#dc2626">YES</text>

  <!-- ══════════════════════════════════════════
       STEP 7 — 이미 발송됨?
  ══════════════════════════════════════════ -->
  <polygon points="380,580 490,608 380,636 270,608" fill="#d97706" filter="url(#shadow)"/>
  <text x="380" y="602" text-anchor="middle" font-size="12" font-weight="bold" fill="white">_no_update_alert</text>
  <text x="380" y="618" text-anchor="middle" font-size="12" font-weight="bold" fill="white">_sent = True?</text>

  <!-- YES → left skip -->
  <line x1="270" y1="608" x2="200" y2="608" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="235" y="600" text-anchor="middle" font-size="11" fill="#64748b">YES</text>
  <rect x="30" y="594" width="170" height="28" rx="8" fill="#f1f5f9"/>
  <text x="115" y="612" text-anchor="middle" font-size="11" fill="#64748b">중복 방지 → 스킵</text>

  <!-- NO → down -->
  <line x1="380" y1="636" x2="380" y2="670" stroke="#dc2626" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="392" y="657" font-size="11" font-weight="bold" fill="#dc2626">NO</text>

  <!-- ══════════════════════════════════════════
       STEP 8 — sns_enabled?
  ══════════════════════════════════════════ -->
  <polygon points="380,670 490,698 380,726 270,698" fill="#d97706" filter="url(#shadow)"/>
  <text x="380" y="694" text-anchor="middle" font-size="12" font-weight="bold" fill="white">sns_enabled = true</text>
  <text x="380" y="710" text-anchor="middle" font-size="12" font-weight="bold" fill="white">AND 설정값 존재?</text>

  <!-- NO → left skip -->
  <line x1="270" y1="698" x2="200" y2="698" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="235" y="690" text-anchor="middle" font-size="11" fill="#64748b">NO</text>
  <rect x="30" y="684" width="170" height="28" rx="8" fill="#f1f5f9"/>
  <text x="115" y="702" text-anchor="middle" font-size="11" fill="#64748b">SNS 스킵 → 로그</text>

  <!-- YES → down -->
  <line x1="380" y1="726" x2="380" y2="760" stroke="#16a34a" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="392" y="747" font-size="11" font-weight="bold" fill="#16a34a">YES</text>

  <!-- ══════════════════════════════════════════
       STEP 9 — SNS API POST (retry 3회)
  ══════════════════════════════════════════ -->
  <rect x="150" y="760" width="460" height="50" rx="10" fill="#b91c1c" filter="url(#shadow)"/>
  <text x="380" y="782" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SNS API Gateway POST (최대 3회 재시도)</text>
  <text x="380" y="800" text-anchor="middle" font-size="11" fill="#fecaca">topicArn / subject / message / protocol → publishMessage</text>

  <!-- Arrow to AWS SNS -->
  <line x1="610" y1="785" x2="648" y2="785" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AWS: SNS -->
  <rect x="648" y="762" width="220" height="44" rx="10" fill="#be185d" filter="url(#shadow)"/>
  <text x="758" y="782" text-anchor="middle" font-size="13" font-weight="bold" fill="white">AWS SNS</text>
  <text x="758" y="798" text-anchor="middle" font-size="11" fill="#fbcfe8">Topic 구독자에게 발송</text>

  <!-- Arrow SNS → Email -->
  <line x1="758" y1="806" x2="758" y2="830" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AWS: Email -->
  <rect x="648" y="830" width="220" height="22" rx="8" fill="#9d174d"/>
  <text x="758" y="845" text-anchor="middle" font-size="12" font-weight="bold" fill="white">📧 [AI Alarm Service Off] 이메일 수신</text>

  <!-- ══════════════════════════════════════════
       STEP 10 — 발송 성공 처리
  ══════════════════════════════════════════ -->
  <rect x="150" y="820" width="460" height="32" rx="8" fill="#166534"/>
  <text x="380" y="840" text-anchor="middle" font-size="12" font-weight="bold" fill="white">_no_update_alert_sent = True  (중복 방지 플래그 설정)</text>

  <!-- Loop back line -->
  <path d="M150,242 Q100,242 100,500 Q100,760 150,760" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arr)"/>
  <text x="60" y="500" text-anchor="middle" font-size="10" fill="#64748b" transform="rotate(-90,60,500)">interval_sec 후 재폴링</text>
</svg>
