<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arr-a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1000" height="680" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="58" fill="#1e1b4b"/>
  <text x="500" y="36" text-anchor="middle" fill="white" font-size="21" font-weight="bold">데이터 흐름 &amp; 저장 구조</text>

  <!-- Layer labels -->
  <rect x="10" y="70" width="80" height="560" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="50" y="200" text-anchor="middle" fill="#64748b" font-size="11" transform="rotate(-90,50,200)">입력 레이어</text>
  <text x="50" y="380" text-anchor="middle" fill="#64748b" font-size="11" transform="rotate(-90,50,380)">처리 레이어</text>
  <text x="50" y="560" text-anchor="middle" fill="#64748b" font-size="11" transform="rotate(-90,50,560)">출력 레이어</text>
  <line x1="10" y1="290" x2="90" y2="290" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="10" y1="470" x2="90" y2="470" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- INPUT LAYER -->
  <!-- Client GUI -->
  <rect x="110" y="80" width="160" height="90" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="190" y="108" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Client GUI</text>
  <text x="190" y="126" text-anchor="middle" fill="#94a3b8" font-size="10">tkinter 앱</text>
  <text x="190" y="143" text-anchor="middle" fill="#60a5fa" font-size="9">단건 / 주기적 분석</text>
  <text x="190" y="158" text-anchor="middle" fill="#60a5fa" font-size="9">5초 / 10초 간격</text>

  <!-- HMI Image -->
  <rect x="110" y="190" width="160" height="80" rx="10" fill="#0f4c75" stroke="#1b6ca8" stroke-width="2"/>
  <text x="190" y="218" text-anchor="middle" fill="white" font-size="12" font-weight="bold">HMI 이미지</text>
  <text x="190" y="236" text-anchor="middle" fill="#7ec8e3" font-size="10">PNG / JPEG</text>
  <text x="190" y="253" text-anchor="middle" fill="#cce0f5" font-size="9">1920 × 1170 px</text>

  <!-- Arrow: Client -> API -->
  <line x1="270" y1="170" x2="340" y2="200" stroke="#6366f1" stroke-width="2" marker-end="url(#arr)"/>
  <text x="295" y="185" fill="#6366f1" font-size="9">HTTP POST</text>

  <!-- PROCESSING LAYER -->
  <!-- Flask API -->
  <rect x="340" y="80" width="160" height="90" rx="10" fill="#312e81" stroke="#4338ca" stroke-width="2"/>
  <text x="420" y="108" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Flask API</text>
  <text x="420" y="126" text-anchor="middle" fill="#c7d2fe" font-size="10">/api/v1/analyze</text>
  <text x="420" y="143" text-anchor="middle" fill="#a5b4fc" font-size="9">이미지 검증</text>
  <text x="420" y="158" text-anchor="middle" fill="#a5b4fc" font-size="9">request_id 생성</text>

  <!-- Arrow: API -> LLM Service -->
  <line x1="420" y1="170" x2="420" y2="200" stroke="#4338ca" stroke-width="2" marker-end="url(#arr)"/>

  <!-- LLM Service -->
  <rect x="340" y="200" width="160" height="80" rx="10" fill="#4c1d95" stroke="#7c3aed" stroke-width="2"/>
  <text x="420" y="228" text-anchor="middle" fill="white" font-size="12" font-weight="bold">LLM Service</text>
  <text x="420" y="246" text-anchor="middle" fill="#ddd6fe" font-size="10">패널 크롭 + 병렬 실행</text>
  <text x="420" y="263" text-anchor="middle" fill="#c4b5fd" font-size="9">DI Agent ‖ LLM Agent</text>

  <!-- Arrow: LLM Service -> DI -->
  <line x1="380" y1="280" x2="240" y2="320" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-b)"/>
  <!-- Arrow: LLM Service -> LLM -->
  <line x1="460" y1="280" x2="600" y2="320" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- DI Agent -->
  <rect x="110" y="320" width="200" height="100" rx="10" fill="#1e3a5f" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="348" text-anchor="middle" fill="white" font-size="12" font-weight="bold">DI Agent</text>
  <text x="210" y="366" text-anchor="middle" fill="#93c5fd" font-size="10">Azure Document Intelligence</text>
  <text x="210" y="383" text-anchor="middle" fill="#bfdbfe" font-size="9">S520/S530/S810 숫자 추출</text>
  <text x="210" y="399" text-anchor="middle" fill="#bfdbfe" font-size="9">테이블 OCR (prebuilt-layout)</text>

  <!-- LLM Agent -->
  <rect x="530" y="320" width="200" height="100" rx="10" fill="#14532d" stroke="#16a34a" stroke-width="2"/>
  <text x="630" y="348" text-anchor="middle" fill="white" font-size="12" font-weight="bold">LLM Agent</text>
  <text x="630" y="366" text-anchor="middle" fill="#86efac" font-size="10">Azure OpenAI GPT-4o Vision</text>
  <text x="630" y="383" text-anchor="middle" fill="#bbf7d0" font-size="9">S520/S530/S540/S810 색상 감지</text>
  <text x="630" y="399" text-anchor="middle" fill="#bbf7d0" font-size="9">langchain-openai</text>

  <!-- Merge arrows -->
  <line x1="210" y1="420" x2="380" y2="460" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="630" y1="420" x2="460" y2="460" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Judgment Engine -->
  <rect x="340" y="460" width="160" height="80" rx="10" fill="#78350f" stroke="#f59e0b" stroke-width="2"/>
  <text x="420" y="488" text-anchor="middle" fill="white" font-size="12" font-weight="bold">판정 엔진</text>
  <text x="420" y="506" text-anchor="middle" fill="#fde68a" font-size="10">결과 병합 + 최종 결정</text>
  <text x="420" y="523" text-anchor="middle" fill="#fcd34d" font-size="9">OK / NG / UNKNOWN</text>

  <!-- OUTPUT LAYER -->
  <!-- Arrow to outputs -->
  <line x1="340" y1="500" x2="160" y2="560" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="420" y1="540" x2="420" y2="560" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="500" x2="680" y2="560" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <line x1="500" y1="500" x2="840" y2="560" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-a)"/>

  <!-- Output boxes -->
  <rect x="60" y="560" width="160" height="90" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="585" text-anchor="middle" fill="#14532d" font-size="11" font-weight="bold">📋 일별 로그</text>
  <text x="140" y="603" text-anchor="middle" fill="#166534" font-size="10">data/logs/</text>
  <text x="140" y="620" text-anchor="middle" fill="#374151" font-size="9">YYYY-MM-DD.log</text>
  <text x="140" y="637" text-anchor="middle" fill="#374151" font-size="9">항상 기록</text>

  <rect x="340" y="560" width="160" height="90" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="420" y="585" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">📊 CSV 이력</text>
  <text x="420" y="603" text-anchor="middle" fill="#1d4ed8" font-size="10">data/client_history.csv</text>
  <text x="420" y="620" text-anchor="middle" fill="#374151" font-size="9">분석 이력 누적</text>
  <text x="420" y="637" text-anchor="middle" fill="#374151" font-size="9">항상 기록</text>

  <rect x="600" y="560" width="160" height="90" rx="10" fill="#fff1f2" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="585" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="bold">💾 JSON 결과</text>
  <text x="680" y="603" text-anchor="middle" fill="#b91c1c" font-size="10">data/results/</text>
  <text x="680" y="620" text-anchor="middle" fill="#374151" font-size="9">req_YYYYMMDD_*.json</text>
  <text x="680" y="637" text-anchor="middle" fill="#374151" font-size="9">dev 모드에서만</text>

  <rect x="790" y="560" width="170" height="90" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="875" y="585" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">📧 이메일 알림</text>
  <text x="875" y="603" text-anchor="middle" fill="#78350f" font-size="10">AWS SNS</text>
  <text x="875" y="620" text-anchor="middle" fill="#374151" font-size="9">UNKNOWN 시 자동 발송</text>
  <text x="875" y="637" text-anchor="middle" fill="#374151" font-size="9">SNS_ENABLED=true 시</text>

  <!-- Azure cloud box -->
  <rect x="760" y="80" width="210" height="200" rx="12" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="865" y="105" text-anchor="middle" fill="#0369a1" font-size="12" font-weight="bold">☁️ Azure Cloud</text>
  <rect x="780" y="115" width="170" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="865" y="140" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">Document Intelligence</text>
  <text x="865" y="158" text-anchor="middle" fill="#1d4ed8" font-size="9">OCR / 테이블 추출</text>
  <rect x="780" y="190" width="170" height="60" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="865" y="215" text-anchor="middle" fill="#14532d" font-size="11" font-weight="bold">OpenAI GPT-4o Vision</text>
  <text x="865" y="233" text-anchor="middle" fill="#15803d" font-size="9">색상 감지 / Vision 분석</text>
  <text x="865" y="258" text-anchor="middle" fill="#0369a1" font-size="9">langchain-openai 연동</text>

  <!-- Arrow DI Agent -> Azure DI -->
  <line x1="310" y1="360" x2="778" y2="145" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-b)"/>
  <!-- Arrow LLM Agent -> Azure LLM -->
  <line x1="730" y1="360" x2="778" y2="215" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-g)"/>
</svg>
