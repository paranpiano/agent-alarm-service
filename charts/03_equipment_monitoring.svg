  <rect x="730" y="260" width="230" height="16" fill="#b45309"/>
  <text x="845" y="263" text-anchor="middle" fill="white" font-size="13" font-weight="bold">S810 — Housing Cooling</text>
  <text x="745" y="290" fill="#374151" font-size="10">📊 DI: 30개 수치값 추출</text>
  <text x="745" y="308" fill="#374151" font-size="10">  • cooling_1: 15개 값</text>
  <text x="745" y="326" fill="#374151" font-size="10">  • cooling_2: 15개 값</text>
  <text x="745" y="344" fill="#374151" font-size="10">🎨 LLM: 빨간 영역 감지</text>
  <text x="745" y="362" fill="#ef4444" font-size="10">  NG 조건: 값 ≥ 3,000 또는 RED 영역</text>

  <!-- Arrows from HMI to cards -->
  <line x1="450" y1="170" x2="478" y2="150" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="450" y1="170" x2="728" y2="150" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="450" y1="290" x2="478" y2="310" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="450" y1="290" x2="728" y2="310" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- NG Threshold summary -->
  <rect x="30" y="390" width="940" height="80" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="500" y="415" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="bold">NG 판정 임계값 요약</text>
  <rect x="60" y="428" width="200" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="448" text-anchor="middle" fill="#991b1b" font-size="11">숫자 NG: 수치값 ≥ 3,000</text>
  <rect x="290" y="428" width="200" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="390" y="448" text-anchor="middle" fill="#991b1b" font-size="11">색상 NG: RED 배경 영역 감지</text>
  <rect x="520" y="428" width="200" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="620" y="448" text-anchor="middle" fill="#92400e" font-size="11">UNKNOWN: 장비 미식별</text>
  <rect x="750" y="428" width="200" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="850" y="448" text-anchor="middle" fill="#92400e" font-size="11">UNKNOWN: 화면 가림/조작 의심</text>

  <!-- Status legend -->
  <rect x="30" y="490" width="940" height="170" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="500" y="515" text-anchor="middle" fill="#111827" font-size="13" font-weight="bold">판정 결과별 동작</text>

  <!-- OK row -->
  <rect x="50" y="528" width="900" height="36" rx="6" fill="#f0fdf4"/>
  <text x="80" y="551" fill="#14532d" font-size="13" font-weight="bold">✅ OK</text>
  <text x="160" y="551" fill="#166534" font-size="11">모든 장비 정상 식별 · 수치 &lt; 3,000 · RED 영역 없음</text>
  <text x="700" y="551" fill="#166534" font-size="11">→ 로그 기록 · Client 초록 표시</text>

  <!-- NG row -->
  <rect x="50" y="572" width="900" height="36" rx="6" fill="#fff1f2"/>
  <text x="80" y="595" fill="#991b1b" font-size="13" font-weight="bold">❌ NG</text>
  <text x="160" y="595" fill="#b91c1c" font-size="11">수치 ≥ 3,000 또는 RED 영역 감지</text>
  <text x="700" y="595" fill="#b91c1c" font-size="11">→ 로그 기록 · Client 빨간 표시 · NG 항목 상세</text>

  <!-- UNKNOWN row -->
  <rect x="50" y="616" width="900" height="36" rx="6" fill="#fffbeb"/>
  <text x="80" y="639" fill="#92400e" font-size="13" font-weight="bold">⚠️ UNKNOWN</text>
  <text x="200" y="639" fill="#78350f" font-size="11">장비 미식별 · 데이터 부족 · 화면 가림 의심</text>
  <text x="700" y="639" fill="#78350f" font-size="11">→ 로그 기록 · 📧 이메일 알림 자동 발송</text>
</svg>
