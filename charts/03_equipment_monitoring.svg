  <rect x="730" y="100" width="230" height="16" fill="#166534"/>
  <text x="845" y="103" text-anchor="middle" fill="white" font-size="13" font-weight="bold">S530 — Cooling</text>
  <text x="745" y="130" fill="#374151" font-size="10">📊 DI: 28개 수치값 추출</text>
  <text x="745" y="148" fill="#374151" font-size="10">  • cooling_1: 14개 값</text>
  <text x="745" y="164" fill="#374151" font-size="10">  • cooling_2: 14개 값</text>
  <text x="745" y="182" fill="#374151" font-size="10">🎨 LLM: 빨간 영역 감지</text>
  <text x="745" y="200" fill="#ef4444" font-size="10">  NG 조건: 값 ≥ 3,000 또는 RED 영역</text>

