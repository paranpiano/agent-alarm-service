  <!-- S520 -->
  <rect x="480" y="80" width="230" height="140" rx="10" fill="white" stroke="#0f4c75" stroke-width="2"/>
  <rect x="480" y="80" width="230" height="36" rx="10" fill="#0f4c75"/>
  <rect x="480" y="100" width="230" height="16" fill="#0f4c75"/>
  <text x="595" y="103" text-anchor="middle" fill="white" font-size="13" font-weight="bold">S520 — Preheating &amp; Curing</text>
  <text x="495" y="130" fill="#374151" font-size="10">📊 DI: 28개 수치값 추출</text>
  <text x="495" y="148" fill="#374151" font-size="10">  • curing_oven: 14개 값</text>
  <text x="495" y="164" fill="#374151" font-size="10">  • preheating_oven: 14개 값</text>
  <text x="495" y="182" fill="#374151" font-size="10">🎨 LLM: 빨간 영역 감지</text>
  <text x="495" y="200" fill="#ef4444" font-size="10">  NG 조건: 값 ≥ 3,000 또는 RED 영역</text>

  <!-- S530 -->
  <rect x="730" y="80" width="230" height="140" rx="10" fill="white" stroke="#166534" stroke-width="2"/>
