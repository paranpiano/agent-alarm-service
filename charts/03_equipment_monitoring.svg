  <text x="495" y="362" fill="#ef4444" font-size="10">  NG 조건: RED/BLACK 배경</text>

  <!-- S810 -->
  <rect x="730" y="240" width="230" height="140" rx="10" fill="white" stroke="#b45309" stroke-width="2"/>
