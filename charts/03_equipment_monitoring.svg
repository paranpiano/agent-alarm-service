<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="1000" height="680" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="58" fill="#0f172a"/>
  <text x="500" y="36" text-anchor="middle" fill="white" font-size="21" font-weight="bold">장비 모니터링 대상 — 4개 장비 분석 구조</text>

  <!-- HMI Screen simulation -->
  <rect x="30" y="80" width="420" height="280" rx="10" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <text x="240" y="105" text-anchor="middle" fill="#94a3b8" font-size="12">HMI 화면 (1920×1170)</text>

  <!-- 4 panels in HMI -->
  <rect x="45" y="115" width="190" height="110" rx="5" fill="#0f4c75" stroke="#1b6ca8" stroke-width="1.5"/>
