  <text x="140" y="155" text-anchor="middle" fill="#cce0f5" font-size="9">Preheating &amp; Curing</text>
  <text x="140" y="172" text-anchor="middle" fill="#94a3b8" font-size="8">예열 / 경화 오븐</text>
  <rect x="55" y="182" width="170" height="35" rx="3" fill="#0a2a40"/>
  <text x="140" y="196" text-anchor="middle" fill="#22d3ee" font-size="8">■ ■ ■ ■ ■ ■ ■</text>
  <text x="140" y="210" text-anchor="middle" fill="#22d3ee" font-size="8">2887 2767 1388 ...</text>

  <rect x="245" y="115" width="190" height="110" rx="5" fill="#1a3a1a" stroke="#2d6a2d" stroke-width="1.5"/>
  <text x="340" y="138" text-anchor="middle" fill="#86efac" font-size="11" font-weight="bold">S530</text>
  <text x="340" y="155" text-anchor="middle" fill="#bbf7d0" font-size="9">Cooling</text>
  <text x="340" y="172" text-anchor="middle" fill="#94a3b8" font-size="8">냉각 시스템</text>
  <rect x="255" y="182" width="170" height="35" rx="3" fill="#0a1f0a"/>
  <text x="340" y="196" text-anchor="middle" fill="#4ade80" font-size="8">■ ■ ■ ■ ■ ■ ■</text>
  <text x="340" y="210" text-anchor="middle" fill="#4ade80" font-size="8">1200 1350 980 ...</text>

  <rect x="45" y="235" width="190" height="110" rx="5" fill="#2d1a3a" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="140" y="258" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">S540</text>
  <text x="140" y="275" text-anchor="middle" fill="#ddd6fe" font-size="9">Robot</text>
  <text x="140" y="292" text-anchor="middle" fill="#94a3b8" font-size="8">로봇 스테이션</text>
  <rect x="55" y="302" width="170" height="35" rx="3" fill="#1a0a2a"/>
  <text x="140" y="316" text-anchor="middle" fill="#a78bfa" font-size="8">ST1 ST2 ST3 ST4 ST5 ST6</text>
  <text x="140" y="330" text-anchor="middle" fill="#a78bfa" font-size="8">🟢 🟢 🟢 🟢 🟢 🟢</text>

  <rect x="245" y="235" width="190" height="110" rx="5" fill="#3a2a0a" stroke="#b45309" stroke-width="1.5"/>
  <text x="340" y="258" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="bold">S810</text>
  <text x="340" y="275" text-anchor="middle" fill="#fde68a" font-size="9">Housing Cooling</text>
  <text x="340" y="292" text-anchor="middle" fill="#94a3b8" font-size="8">하우징 냉각</text>
  <rect x="255" y="302" width="170" height="35" rx="3" fill="#1f1500"/>
  <text x="340" y="316" text-anchor="middle" fill="#fbbf24" font-size="8">■ ■ ■ ■ ■ ■ ■</text>
  <text x="340" y="330" text-anchor="middle" fill="#fbbf24" font-size="8">1500 1620 1480 ...</text>

